    <style>

        }
        body { margin: 0; font-family: var(--font-main); background: linear-gradient(to bottom, #a0d8ef 0%, #fdfdfd 100%); display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 10px 0; }
        
        .container { width: 95%; max-width: 1200px; background: white; border-radius: 30px; border: 8px solid #9d8189; padding: 20px 30px; margin-bottom: 20px; box-sizing: border-box; box-shadow: 15px 15px 0px rgba(0,0,0,0.05); }
        
        .header-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 3px solid #eee; padding-bottom: 10px; }
        
        /* 表格樣式：維持您的原始設定 */
        .overview-table { width: 100%; border-collapse: separate; border-spacing: 0 5px; margin-bottom: 10px; }
        .row-grade { background: var(--accent-yellow); width: 15%; text-align: center; font-size: 2rem; font-weight: 900; border-radius: 15px 0 0 15px; padding: 8px; color: #333; }
        .row-en { 
            background: #fff; border: 4px solid var(--accent-yellow); border-left: none; width: 70%; 
            font-size: 1.8rem; font-weight: 800; padding: 8px 0 15px 20px; 
            line-height: 1.1; white-space: pre-wrap; color: #111; 
        }
        .row-speak { background: #fff; border: 4px solid var(--accent-yellow); border-left: none; width: 15%; border-radius: 0 15px 15px 0; text-align: center; }
        
        /* 劇本樣式修正：只動這裡，極限縮排並防止截斷 */
        .script-section { margin-top: 5px; border-top: 2px solid #eee; padding-top: 10px; }
        .script-title { font-weight: bold; margin-bottom: 5px; color: var(--accent-orange); font-size: 1.5rem; display: flex; justify-content: space-between; align-items: center; }
        .script-area { 
            background: #fdfdfd; border: 5px dashed var(--accent-green); border-radius: 20px; 
            padding: 10px 25px 25px 25px; /* 增加底部 Padding 確保 y 尾巴完整 */
            font-size: 1.7rem; 
            line-height: 1.2; /* 極限縮排，讓劇本上下排靠近 */
            white-space: pre-wrap; color: #222; font-weight: 500; 
        }
        .highlight { color: #e63946; font-weight: 900; text-decoration: underline; background: rgba(230,57,70,0.1); padding: 0 5px; border-radius: 5px; }
        
        /* 抽籤器樣式：維持您的原始設定 */
        .lottery-section { margin-top: 20px; background: rgba(255, 255, 255, 0.95); border-radius: 40px; padding: 30px; border: 8px solid var(--mario-blue); text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .settings-bar { display: flex; justify-content: center; gap: 20px; margin-bottom: 15px; font-size: 1.3rem; background: #f1f8e9; padding: 15px; border-radius: 20px; }
        
        .quick-exclude-box { background: #f9f9f9; border-radius: 20px; padding: 20px; margin-bottom: 25px; border: 2px solid #eee; }
        .chip-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-top: 5px; }
        .student-chip { padding: 6px 15px; border-radius: 15px; border: 2px solid var(--mario-blue); background: white; color: var(--mario-blue); font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 1rem; }
        .student-chip.is-drawn { background: #eee; border-color: #ccc; color: #999; }
        
        .display-card { background-color: #fff9c4; border: 8px solid #ff5722; border-radius: 40px; padding: 30px 20px; min-height: 320px; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        #winner-name { font-size: 8rem; font-weight: 900; color: var(--mario-red); text-shadow: 4px 4px 0px white, 8px 8px 0px rgba(0,0,0,0.1); margin: 5px 0; padding-bottom: 15px; line-height: 1; }
        .shuffling-text { color: var(--mario-blue) !important; transform: scale(0.92); }
        
        .sentence-box { width: 95%; background: white; border: 5px solid #ffb74d; border-radius: 25px; padding: 20px; margin-top: 15px; display: none; text-align: left; }
        .sentence-en { font-size: 2.4rem; color: var(--mario-blue); font-weight: 900; line-height: 1.1; margin-bottom: 5px; padding-bottom: 10px; }
        .sentence-ch { font-size: 2rem; color: #444; font-weight: bold; }
        
        .draw-btn { padding: 15px 70px; font-size: 2rem; background: #ff5722; color: white; border: none; border-radius: 100px; cursor: pointer; font-weight: bold; box-shadow: 0 10px 0px #b71c1c; transition: 0.1s; }
        .draw-btn:active { transform: translateY(4px); box-shadow: 0 6px 0px #b71c1c; }
        .sync-dot { height: 12px; width: 12px; border-radius: 50%; display: inline-block; margin-right: 8px; background-color: #bbb; }
        .sync-active { background-color: #28a745; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        .celebrate { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1.1); opacity: 1; } }
        .speak-btn { font-size: 1.2rem; cursor: pointer; background: var(--accent-green); color: white; border: none; border-radius: 12px; padding: 8px 15px; font-weight: bold; }
    </style>
</head>

        const students = rawRoster.split('\n').map(l => {
            const [klass, seat, name] = l.split(',');
            return { id: klass+seat+name, klass, seat, name };
        });

        let drawnHistory = JSON.parse(localStorage.getItem('drawn_history_final_v15_fixed')) || [];
        let currentWeek = 5; 
        let cloudScript = "";

        const weekSelect = document.getElementById('week-select');
        Object.keys(weekDates).forEach(w => {
            let opt = new Option(`第 ${w} 週 (${weekDates[w]})`, w);
            if(w == currentWeek) opt.selected = true;
            weekSelect.add(opt);
        });

        const gradeSelect = document.getElementById('gradeSelect');
        const classSelect = document.getElementById('classSelect');
        ["一年", "二年", "三年", "四年", "五年", "六年"].forEach(g => gradeSelect.add(new Option(g + "級", g)));

        function updateClassOptions() {
            const grade = gradeSelect.value;
            const classesInGrade = [...new Set(students.filter(s => s.klass.startsWith(grade)).map(s => s.klass))];
            classSelect.innerHTML = "";
            classSelect.add(new Option("全部班級", "all"));
            classesInGrade.forEach(c => classSelect.add(new Option(c, c)));
            updateCounter();
        }

        function updateCounter() {
            const grade = gradeSelect.value;
            const klass = classSelect.value;
            const chipArea = document.getElementById('student-list-chips');
            chipArea.innerHTML = ""; 
            let pool = students.filter(s => s.klass.startsWith(grade));
            if (klass !== "all") pool = pool.filter(s => s.klass === klass);
            pool.forEach(std => {
                const isDrawn = drawnHistory.includes(std.id);
                const chip = document.createElement('button');
                chip.innerText = std.name;
                chip.className = isDrawn ? "student-chip is-drawn" : "student-chip";
                chip.onclick = () => toggleExclude(std.id);
                chipArea.appendChild(chip);
            });
            const total = pool.length;
            const drawnCount = drawnHistory.filter(id => pool.some(s => s.id === id)).length;
            document.getElementById('counter-info').innerText = `選定名單共 ${total} 人，已抽 ${drawnCount} 人，剩餘 ${total - drawnCount} 人`;
        }

        function toggleExclude(id) {
            if (drawnHistory.includes(id)) {
                drawnHistory = drawnHistory.filter(i => i !== id);
            } else {
                drawnHistory.push(id);
            }
            localStorage.setItem('drawn_history_final_v15_fixed', JSON.stringify(drawnHistory));
            updateCounter();
        }

        async function fetchScriptFromCloud() {
            const dot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');
            dot.className = "sync-dot sync-active";
            statusText.innerText = "同步雲端中...";
            try {
                const res = await fetch(`${SHEET_URL}&nocache=${Date.now()}`);
                const text = await res.text();
                const rows = [];
                let currField = '', inQuotes = false, currRow = [];
                const safeText = text.trim() + '\n';
                for (let i = 0; i < safeText.length; i++) {
                    let c = safeText[i], n = safeText[i+1];
                    if (c === '"' && inQuotes && n === '"') { currField += '"'; i++; }
                    else if (c === '"') { inQuotes = !inQuotes; }
                    else if (c === ',' && !inQuotes) { currRow.push(currField); currField = ''; }
                    else if ((c === '\n' || c === '\r') && !inQuotes) {
                        currRow.push(currField); rows.push(currRow); currRow = []; currField = '';
                        if (c === '\r' && n === '\n') i++;
                    } else { currField += c; }
                }
                const target = rows.find(r => r[0] && r[0].trim() == String(currentWeek));
                if (target) {
                    let found = "";
                    for(let i = target.length - 1; i >= 1; i--) {
                        let content = target[i] ? target[i].trim() : "";
                        if(content.length > 5) { found = content; break; }
                    }
                    cloudScript = found || "本週尚未輸入劇本。";
                    statusText.innerText = "同步成功";
                    dot.style.backgroundColor = "#28a745";
                }
            } catch (e) {
                statusText.innerText = "連線失敗";
                dot.style.backgroundColor = "#dc3545";
            }
            dot.className = "sync-dot";
            renderTable();
        }

        function highlightText(text) {
            let txt = text;
            const phrases = weeklyDB[currentWeek] || [];
            phrases.forEach(p => {
                const engOnly = p.split('\n')[0].replace(/[.!?,]$/, '').trim();
                if(engOnly.length < 3) return;
                const safeEng = engOnly.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                const reg = new RegExp(`(${safeEng}[^\\s\\n\\.]*)`, 'gi');
                txt = txt.replace(reg, `<span class="highlight">$1</span>`);
            });
            return txt.replace(/\n/g, '<br>');
        }

        function renderTable() {
            const phrases = weeklyDB[currentWeek];
            const grades = ["三", "四", "五", "六"];
            let h = '';
            phrases.forEach((txt, i) => { 
                const isHoliday = (txt === "—" || txt.includes("全中運"));
                h += `<tr>
                        <td class="row-grade">${grades[i]}年級</td>
                        <td class="row-en">${txt}</td>
                        <td class="row-speak">
                            <button class="speak-btn" onclick="speak('${txt.split('\n')[0].replace(/'/g, "\\'")}')" ${isHoliday ? 'style="display:none"' : ''}>🔊 發音</button>
                        </td>
                      </tr>`; 
            });
            document.getElementById('table-content').innerHTML = h;
            document.getElementById('script-content').innerHTML = highlightText(cloudScript);
        }

        let audioCtx = null;
        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        function playCoin() {
            initAudio(); const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'square'; osc.frequency.setValueAtTime(987.77, audioCtx.currentTime); 
            osc.frequency.setValueAtTime(1318.51, audioCtx.currentTime + 0.08); 
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }
        function playPowerUp() {
            initAudio(); const freqs = [130.81, 155.56, 196.00, 261.63, 311.13, 392.00, 523.25, 622.25, 783.99];
            freqs.forEach((f, i) => {
                const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
                osc.type = 'square'; osc.frequency.setValueAtTime(f, audioCtx.currentTime + i * 0.07);
                g.gain.setValueAtTime(0.08, audioCtx.currentTime + i * 0.07); g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i * 0.07 + 0.1);
                osc.connect(g); g.connect(audioCtx.destination); osc.start(audioCtx.currentTime + i * 0.07); osc.stop(audioCtx.currentTime + i * 0.07 + 0.1);
            });
        }

        const btnDraw = document.getElementById('btnDraw');
        const winnerName = document.getElementById('winner-name');
        const winnerInfo = document.getElementById('winner-info');
        const sentenceBox = document.getElementById('sentence-box');

        btnDraw.addEventListener('click', () => {
            const grade = gradeSelect.value;
            const klass = classSelect.value;
            let pool = students.filter(s => s.klass.startsWith(grade) && !drawnHistory.includes(s.id));
            if (klass !== "all") pool = pool.filter(s => s.klass === klass);
            if (pool.length === 0) {
                if (confirm("這組名單全都抽過囉！要重置嗎？")) { resetDrawnHistory(); }
                return;
            }
            btnDraw.disabled = true;
            sentenceBox.style.display = 'none';
            winnerName.classList.remove('celebrate');
            winnerInfo.innerText = "🔍 搜尋同學中...";
            let counter = 0;
            const interval = setInterval(() => {
                const rand = pool[Math.floor(Math.random() * pool.length)];
                winnerName.innerText = rand.name;
                winnerName.classList.add('shuffling-text');
                if (counter % 3 === 0) playCoin();
                counter++;
                if (counter >= 22) {
                    clearInterval(interval);
                    winnerName.classList.remove('shuffling-text');
                    const final = pool[Math.floor(Math.random() * pool.length)];
                    winnerName.innerText = final.name;
                    winnerName.classList.add('celebrate');
                    drawnHistory.push(final.id);
                    localStorage.setItem('drawn_history_final_v15_fixed', JSON.stringify(drawnHistory));
                    updateCounter();
                    const gKey = grade[0];
                    const gMap = {"三":0, "四":1, "五":2, "六":3};
                    if (gMap.hasOwnProperty(gKey)) {
                        const fullText = weeklyDB[currentWeek][gMap[gKey]];
                        if (fullText && fullText !== "—") {
                            const [en, ch] = fullText.split('\n');
                            document.getElementById('sentence-en').innerText = en;
                            document.getElementById('sentence-ch').innerText = ch || "";
                            sentenceBox.style.display = 'block';
                        }
                    }
                    playPowerUp();
                    btnDraw.disabled = false;
                }
            }, 85);
        });

        function resetDrawnHistory() {
            if (confirm(`確定要清除所有抽籤紀錄，讓所有人重新回到抽籤名單嗎？`)) {
                drawnHistory = [];
                localStorage.setItem('drawn_history_final_v15_fixed', JSON.stringify(drawnHistory));
                updateCounter();
                winnerName.innerText = "？";
                winnerInfo.innerText = "Ready?";
                sentenceBox.style.display = 'none';
            }
        }

        function changeWeek() { currentWeek = parseInt(weekSelect.value); fetchScriptFromCloud(); }
        function speak(text) {
            window.speechSynthesis.cancel();
            const m = new SpeechSynthesisUtterance(text);
            m.lang = 'en-US'; m.rate = 0.8; window.speechSynthesis.speak(m);
        }

        updateClassOptions();
        fetchScriptFromCloud();
    </script>
